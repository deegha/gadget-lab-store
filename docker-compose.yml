services:
  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gadgetlab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gadgetlab"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/gadgetlab-images &&
        mc anonymous set public local/gadgetlab-images &&
        echo 'MinIO bucket ready.'
      "

  # ── Applications ──────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: gadget-lab-api/Dockerfile
      target: dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gadgetlab
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      NODE_ENV: development
    ports:
      - "3001:3001"
    volumes:
      - ./gadget-lab-api/src:/app/gadget-lab-api/src
      - ./packages/types/src:/app/packages/types/src
    depends_on:
      postgres:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

  storefront:
    build:
      context: .
      dockerfile: gadget-lab/Dockerfile
      target: dev
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      INTERNAL_API_URL: http://api:3001
    ports:
      - "3000:3000"
    volumes:
      - ./gadget-lab/src:/app/gadget-lab/src
      - ./gadget-lab/public:/app/gadget-lab/public
    depends_on:
      - api

  admin:
    build:
      context: .
      dockerfile: gadget-lab-admin/Dockerfile
      target: dev
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      INTERNAL_API_URL: http://api:3001
    ports:
      - "3002:3002"
    volumes:
      - ./gadget-lab-admin/src:/app/gadget-lab-admin/src
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
